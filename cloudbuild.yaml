steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'us-west1-docker.pkg.dev/mgr-conect2/cloud-run-source-deploy/mgr-conect2/mgr-conect-2'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=AIzaSyAs_GeZwN_cuO43rfyZ8mhwyaQ-6dXLkhg'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-west1-docker.pkg.dev/mgr-conect2/cloud-run-source-deploy/mgr-conect2/mgr-conect-2']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mgr-conect-2'
      - '--image'
      - 'us-west1-docker.pkg.dev/mgr-conect2/cloud-run-source-deploy/mgr-conect2/mgr-conect-2'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
images:
  - 'us-west1-docker.pkg.dev/mgr-conect2/cloud-run-source-deploy/mgr-conect2/mgr-conect-2'
substitutions:
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_PROJECT_ID: ''
