# ⚠️ NÃO troque `gen-lang-client-0227796366` por `mgr-conect2` abaixo — mesmo que o
# Console GCP mostre esse projeto rotulado como "duplicado", é onde o Cloud Run
# (mgr-conect-2) roda de fato em produção. `mgr-conect2` é só o projeto Firebase
# (Firestore/Auth/Functions/Hosting) — o Cloud Run dele está parado desde março/2026.
# Antes de mudar qualquer `--project` aqui, confirme com:
#   gcloud run revisions list --service=mgr-conect-2 --project=<ID> --region=us-west1
# e compare as datas das revisões mais recentes com `git log`. Ver README.md § 1.
steps:
  # 1 — Build Docker image with Vite build args
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'us-west1-docker.pkg.dev/gen-lang-client-0227796366/cloud-run-source-deploy/mgr-conect2/mgr-conect-2'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=AIzaSyBrWb98BF5WE8f2jaBzMJHzNaQcxV6HRDw'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID'
      - '.'

  # 2 — Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-west1-docker.pkg.dev/gen-lang-client-0227796366/cloud-run-source-deploy/mgr-conect2/mgr-conect-2'

  # 3 — Deploy site institucional ao Firebase Hosting (public-site/)
  - name: 'node:20-slim'
    entrypoint: 'bash'
    allowFailure: true
    args:
      - '-c'
      - |
        npm install -g firebase-tools --quiet
        firebase deploy --only hosting:site --project mgr-conect2 --non-interactive

  # 4 — Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mgr-conect-2'
      - '--image'
      - 'us-west1-docker.pkg.dev/gen-lang-client-0227796366/cloud-run-source-deploy/mgr-conect2/mgr-conect-2'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--project'
      - 'gen-lang-client-0227796366'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--timeout'
      - '120'
      - '--set-env-vars=GEMINI_API_KEY=AIzaSyBrWb98BF5WE8f2jaBzMJHzNaQcxV6HRDw,NODE_ENV=production'
      - '--cpu-boost'

images:
  - 'us-west1-docker.pkg.dev/gen-lang-client-0227796366/cloud-run-source-deploy/mgr-conect2/mgr-conect-2'

substitutions:
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_PROJECT_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY
