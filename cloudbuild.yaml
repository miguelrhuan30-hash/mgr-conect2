steps:
  # Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mgr-conect-2'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=$_VITE_GEMINI_API_KEY'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID'
      - '.'

  # Push da imagem para o Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mgr-conect-2']

  # Deploy no Cloud Run — região corrigida para us-west1
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mgr-conect-2'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mgr-conect-2'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/mgr-conect-2'

# Variáveis substituíveis (definir no gatilho do Cloud Build)
substitutions:
  _VITE_GEMINI_API_KEY: ''
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_PROJECT_ID: ''
