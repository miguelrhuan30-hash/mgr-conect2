<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: Inter, Arial, sans-serif; color: #1A1A1A; scroll-behavior: smooth; }
  a { text-decoration: none; color: inherit; cursor: pointer; }
  * { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; box-sizing: border-box; }
  input, textarea, button { font-family: inherit; }

  img { max-width: 100%; height: auto; }

  /* ── Responsivo (mesmas breakpoints das sub-páginas) ── */
  @media (max-width: 1100px) {
    .pad { padding-left: 32px !important; padding-right: 32px !important; padding-top: 80px !important; padding-bottom: 80px !important; }
    .pad h1 { font-size: 56px !important; line-height: 1.05 !important; letter-spacing: -1.6px !important; }
    .pad h2 { font-size: 36px !important; line-height: 1.1 !important; letter-spacing: -1px !important; }
    .nav-links { display: none !important; }
    /* Top-level grid de cada section vira coluna única */
    .pad > div[style*="grid-template-columns"],
    .pad > div > div[style*="grid-template-columns"] { grid-template-columns: 1fr !important; gap: 40px !important; }
    /* Grids 3-4 cols viram 2 cols */
    .pad div[style*="repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; }
    .pad div[style*="repeat(3"] { grid-template-columns: repeat(2, 1fr) !important; }
    /* Hero header padding interno */
    section [style*="80px 56px"] { padding: 56px 0 !important; }
  }
  @media (max-width: 640px) {
    .pad { padding-left: 20px !important; padding-right: 20px !important; padding-top: 64px !important; padding-bottom: 64px !important; }
    .pad h1 { font-size: 38px !important; letter-spacing: -1.2px !important; line-height: 1.05 !important; }
    .pad h2 { font-size: 28px !important; letter-spacing: -0.8px !important; }
    .pad p { font-size: 16px !important; }
    /* Tudo coluna única */
    .pad div[style*="repeat(4"],
    .pad div[style*="repeat(3"],
    .pad div[style*="repeat(2"] { grid-template-columns: 1fr !important; }
    /* Header MGR — reduz padding lateral */
    .pad [style*="22px 56px"] { padding: 16px 20px !important; }
  }
</style>
